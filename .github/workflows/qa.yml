name: QA

on:
  workflow_call: {}
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.2', '8.3', '8.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, intl, xdebug
          coverage: xdebug

      - name: Get composer cache directory
        id: composer-cache
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-files-dir)" >> $GITHUB_ENV

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest --optimize-autoloader

      - name: Run PHPStan
        run: composer phpstan -- --no-progress

      - name: Run php-cs-fixer (dry-run)
        run: composer cs-lint

      - name: Run twig-cs-fixer lint
        run: vendor/bin/twig-cs-fixer lint . --config=.twig-cs-fixer.php --no-cache || true

      - name: Run rector (dry-run)
        run: composer rector

      - name: Run tests with coverage
        run: |
          ./vendor/bin/phpunit --configuration phpunit.xml --log-junit junit.xml --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage and test results artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage.xml
            junit.xml
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  infection:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest --optimize-autoloader

      - name: Run Infection (mutation testing)
        run: vendor/bin/infection --min-msi=50
        continue-on-error: true

      - name: Upload Infection reports
        uses: actions/upload-artifact@v4
        with:
          name: infection-report
          path: |
            infection.html
            infection.log
          if-no-files-found: warn
